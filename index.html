<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Austin Powerlifting</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111214; --s1: #18191c; --s2: #1f2024; --s3: #26272c; --s4: #2e2f35;
  --border: #2e2f35; --border2: #3a3b42; --text: #e8e8ea; --muted: #595b63;
  --dim: #38393f; --accent: #d42b2b; --accent-bright: #ff3333;
  --accent-dim: rgba(212,43,43,.15); --accent-border: rgba(212,43,43,.35);
  --orange: #e84a1a; --red: #ff3333; --green: #3ecf6e; --yellow: #e8b84b; --blue: #4a9eff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#root{height:100%;display:flex;flex-direction:column}

/* --- GATE --- */
.gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;position:relative;overflow:hidden;background:radial-gradient(circle at center, #1a1b1e 0%, #111214 100%)}
.gate-logo-main{font-family:'Barlow Condensed',sans-serif;font-size:88px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--text);text-shadow:0 10px 30px rgba(0,0,0,0.5)}
.gate-logo-main span{color:var(--accent)}
.gate-pw{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:28px;padding:12px 20px;width:180px;text-align:center;letter-spacing:10px;outline:none;border-radius:4px;box-shadow:inset 0 2px 10px rgba(0,0,0,0.5)}
.gate-go{background:var(--accent);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;padding:12px 40px;cursor:pointer;text-transform:uppercase;border-radius:4px;transition:all 0.2s}
.gate-go:active{transform:scale(0.95);background:var(--accent-bright)}

/* --- TOPBAR --- */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);border-top:3px solid var(--accent);padding:0 20px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;height:55px}
.topbar-brand{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--text);display:flex;align-items:center;padding-right:24px;border-right:1px solid var(--border);letter-spacing:-0.5px}
.topbar-brand em{color:var(--accent);font-style:normal}
.topbar-nav{display:flex;align-items:stretch;flex:1;overflow-x:auto}
.tnav{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;padding:0 18px;text-transform:uppercase;border-bottom:3px solid transparent;white-space:nowrap;transition:0.2s}
.tnav:hover{color:var(--text)}
.tnav.active{color:var(--accent);border-bottom-color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px;border-left:1px solid var(--border)}
.max-item{text-align:center;margin-left:12px}
.max-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase}
.max-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;line-height:1.1}

/* --- WEEKBAR --- */
.weekbar{background:var(--s1);border-bottom:1px solid var(--border);display:flex;padding:0 12px;overflow-x:auto;gap:2px;scrollbar-width:none}
.weekbar::-webkit-scrollbar{display:none}
.wpill{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;padding:12px 14px 10px;text-transform:uppercase;white-space:nowrap}
.wpill.active{color:var(--accent);border-bottom-color:var(--accent)}

/* --- DAY CARDS --- */
.main{flex:1;padding:16px 20px;max-width:1000px;width:100%;margin:0 auto}
.day-card{border:1px solid var(--border);border-left:3px solid var(--dim);margin-bottom:8px;background:var(--s1);transition:0.2s}
.day-card.active-day{border-left-color:var(--accent);background:var(--s2)}
.day-hdr{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.day-status{width:7px;height:7px;border-radius:50%;background:var(--dim)}
.day-status.done{background:var(--green);box-shadow:0 0 8px var(--green)}
.day-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--text);text-transform:uppercase}
.day-desc{font-size:12px;color:var(--muted);margin-left:auto}

/* --- EXERCISE ROWS --- */
.ex-row{display:grid;grid-template-columns:200px 80px repeat(4, 1fr) 80px 80px 32px;gap:0;border-bottom:1px solid #1a1a1a;padding:8px 0;align-items:center}
.ex-label{font-weight:600;font-size:14px;padding-left:14px}
.kg-input{background:var(--s3);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;padding:6px 0;width:56px;text-align:center;outline:none;border-radius:2px}
.kg-input:focus{border-color:var(--accent)}

/* --- PLATE VISUALIZER --- */
.bar-viz{margin:6px 14px 10px;padding:8px 12px;background:var(--s2);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;gap:4px;overflow-x:auto}
.bv-plate{border-radius:1px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:7px;font-weight:900;color:rgba(0,0,0,0.7);min-width:7px}
.bv-collar{width:5px;height:30px;background:#444;border-radius:1px}
</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PW = "1414";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6y22WT8IwMmBtIlYZvwYjv9aST-jZYRjIhoBmRzsoFJZ_t80g54YEP6nEQBTp36j_/exec";
const LBS_CONV = 2.20462;

const KG_PLATES = [
  {kg: 25, color: '#e62020', h: 60},
  {kg: 20, color: '#1a6ec7', h: 54},
  {kg: 15, color: '#f5c400', h: 48},
  {kg: 10, color: '#2ea832', h: 40},
  {kg: 5, color: '#ffffff', h: 32},
  {kg: 2.5, color: '#000000', h: 26, textColor: '#fff'},
  {kg: 1.25, color: '#999999', h: 20}
];

function calcPlates(kg) {
  let side = (kg - 20) / 2;
  if (side <= 0) return [];
  const res = [];
  KG_PLATES.forEach(p => {
    const count = Math.floor(side / p.kg + 0.0001);
    if (count > 0) { res.push({...p, count}); side -= p.kg * count; }
  });
  return res;
}

const defaultProgram = () => ({
  1: {label: "Week 1", phase: "Hypertrophy", days: [
    {id: "mon", name: "Monday", desc: "Upper Vol", exercises: [
      {name: "Squat", targetRPE: "7", sets: [{kg: 150, reps: "x6"}, {kg: 150, reps: "x6"}]},
      {name: "Bench Press", targetRPE: "7", sets: [{kg: 100, reps: "x6"}]}
    ]}
  ]},
  6: {label: "Week 6", phase: "Peak", days: [
    {id: "fri", name: "Friday", desc: "Heavy Singles", exercises: [
      {name: "Deadlift", targetRPE: "9", sets: [{kg: 236, reps: "x1"}]}
    ]}
  ]}
});

function App() {
  const [authed, setAuthed] = useState(false);
  const [pass, setPass] = useState("");
  const [tab, setTab] = useState("log");
  const [currentWeek, setCurrentWeek] = useState(6);
  const [program, setProgram] = useState(() => JSON.parse(localStorage.getItem('ap_prog')) || defaultProgram());
  const [logData, setLogData] = useState(() => JSON.parse(localStorage.getItem('ap_log')) || {});

  useEffect(() => { localStorage.setItem('ap_prog', JSON.stringify(program)); }, [program]);
  useEffect(() => { localStorage.setItem('ap_log', JSON.stringify(logData)); }, [logData]);

  if (!authed) return (
    <div className="gate">
      <div className="gate-logo-main">AUSTIN<span>LIFT</span></div>
      <input className="gate-pw" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter' && pass===PW && setAuthed(true)} />
      <button className="gate-go" onClick={() => pass === PW && setAuthed(true)}>Enter</button>
    </div>
  );

  return (
    <div id="root">
      <div className="topbar">
        <div className="topbar-brand">AUSTIN<em>LIFT</em></div>
        <div className="topbar-nav">
          <button className={`tnav ${tab==='log'?'active':''}`} onClick={()=>setTab('log')}>Log</button>
          <button className={`tnav ${tab==='coach'?'active':''}`} onClick={()=>setTab('coach')}>Coach AI</button>
        </div>
        <div className="topbar-right">
          <div className="max-item"><div className="max-label">SQ</div><div className="max-val">513</div></div>
          <div className="max-item"><div className="max-label">BP</div><div className="max-val">314</div></div>
          <div className="max-item"><div className="max-label">DL</div><div className="max-val">584</div></div>
        </div>
      </div>
      <div className="weekbar">
        {[1,2,3,4,5,6].map(w => (
          <button key={w} className={`wpill ${currentWeek===w?'active':''}`} onClick={()=>setCurrentWeek(w)}>W{w}</button>
        ))}
      </div>
      <div className="main">
        {tab === 'log' && (
          <div>
            <div style={{marginBottom: 20, fontSize: 24, fontWeight: 900}}>{program[currentWeek].label} - {program[currentWeek].phase}</div>
            {program[currentWeek].days.map(day => (
              <div key={day.id} className="day-card">
                <div className="day-hdr"><div className="day-name">{day.name}</div></div>
                {day.exercises.map((ex, i) => (
                  <div key={i} style={{padding: '0 15px 15px'}}>
                    <div style={{fontWeight: 600}}>{ex.name} (RPE {ex.targetRPE})</div>
                    <div style={{display: 'flex', gap: 10, marginTop: 8}}>
                      {ex.sets.map((s, si) => (
                        <div key={si}>
                          <input className="kg-input" placeholder={s.kg} onChange={e => {
                            const val = e.target.value;
                            setLogData(prev => ({...prev, [`w${currentWeek}_${day.id}_${i}_${si}`]: val}));
                          }} />
                        </div>
                      ))}
                    </div>
                    {logData[`w${currentWeek}_${day.id}_${i}_0`] && (
                      <div className="bar-viz">
                        <div className="bv-collar" />
                        {calcPlates(logData[`w${currentWeek}_${day.id}_${i}_0`]).map((p, pi) => (
                          <div key={pi} className="bv-plate" style={{background: p.color, height: p.h, width: 10}}>{p.kg}</div>
                        ))}
                        <div style={{fontWeight: 900, marginLeft: 10}}>{(logData[`w${currentWeek}_${day.id}_${i}_0`] * LBS_CONV).toFixed(1)} LBS</div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

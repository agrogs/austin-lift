<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Austin Powerlifting</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111214; --s1: #18191c; --s2: #1f2024; --s3: #26272c; --s4: #2e2f35;
  --border: #2e2f35; --border2: #3a3b42; --text: #e8e8ea; --muted: #595b63;
  --dim: #38393f; --accent: #d42b2b; --accent-bright: #ff3333;
  --accent-dim: rgba(212,43,43,.15); --accent-border: rgba(212,43,43,.35);
  --orange: #e84a1a; --red: #ff3333; --green: #3ecf6e; --yellow: #e8b84b; --blue: #4a9eff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column}

/* --- GATE --- */
.gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;position:relative;overflow:hidden}
.gate-logo-main{font-family:'Barlow Condensed',sans-serif;font-size:88px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--text)}.gate-logo-main span{color:var(--accent)}
.gate-pw{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:28px;padding:12px 20px;width:160px;text-align:center;letter-spacing:10px;outline:none}
.gate-go{background:var(--accent);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;padding:12px 28px;cursor:pointer;text-transform:uppercase}

/* --- TOPBAR --- */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);border-top:3px solid var(--accent);padding:0 20px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;height:55px}
.topbar-brand{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--text);display:flex;align-items:center;padding-right:24px;border-right:1px solid var(--border)}.topbar-brand em{color:var(--accent);font-style:normal}
.tnav{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;padding:0 18px;text-transform:uppercase;border-bottom:3px solid transparent;white-space:nowrap}
.tnav.active{color:var(--accent);border-bottom-color:var(--accent)}

/* --- WEEK BAR --- */
.weekbar{background:var(--s1);border-bottom:1px solid var(--border);display:flex;padding:0 12px;overflow-x:auto;gap:2px}
.wpill{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;padding:10px 14px 8px;text-transform:uppercase;white-space:nowrap}
.wpill.active{color:var(--accent);border-bottom-color:var(--accent)}

/* --- DAY CARDS --- */
.main{flex:1;padding:16px 20px;max-width:1000px;width:100%;margin:0 auto}
.day-card{border:1px solid var(--border);margin-bottom:8px;background:var(--s1)}
.day-hdr{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer}
.day-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--text);text-transform:uppercase}
.ex-row{display:grid;grid-template-columns:200px 80px repeat(4,1fr) 80px 80px 32px;gap:0;border-bottom:1px solid #1a1a1a;padding:6px 0}
.kg-input{background:var(--s3);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:4px 5px;width:54px;text-align:center;outline:none}

/* --- PLATE VISUALIZER --- */
.bar-viz{margin:4px 6px 2px;padding:6px 8px;background:var(--s2);border:1px solid var(--border)}
.bar-viz-inner{display:flex;align-items:center;gap:2px}
.bv-plate{border-radius:1px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:7px;font-weight:600;color:#000;min-width:6px}
.bv-collar{width:4px;height:28px;background:#444;border-radius:1px}

/* --- COACH AI & CHAT --- */
.nw-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.nw-chat-messages{background:var(--s1);border:1px solid var(--border);height:400px;overflow-y:auto;padding:14px}
.nw-bubble{padding:10px 14px;margin-bottom:10px;font-size:13px}
.nw-bubble.user{background:var(--accent);color:#000}
.nw-bubble.ai{background:var(--s3);border:1px solid var(--border2)}

/* ... Remaining CSS ... */
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const PW = "1414";
const SCRIPT = "https://script.google.com/macros/s/AKfycby6y22WT8IwMmBtIlYZvwYjv9aST-jZYRjIhoBmRzsoFJZ_t80g54YEP6nEQBTp36j_/exec";
const MAXES = { squat: 232.7, bench: 142.4, deadlift: 265 }; 
const BAR_KG = 20;

const KG_PLATES = [
  {kg:25,  color:'#e62020', h:58},
  {kg:20,  color:'#1a6ec7', h:52},
  {kg:15,  color:'#f5c400', h:46},
  {kg:10,  color:'#2ea832', h:38},
  {kg:5,   color:'#f0f0f0', h:30},
  {kg:2.5, color:'#f0f0f0', h:24},
  {kg:1.25,color:'#888',    h:18},
];

function calcKgPlates(totalKg) {
  let remaining = (totalKg - BAR_KG) / 2;
  if (remaining < 0 || isNaN(remaining)) return null;
  const result = [];
  for (const p of KG_PLATES) {
    const n = Math.floor(remaining / p.kg + 0.001);
    if (n > 0) { result.push({...p, count: n}); remaining -= p.kg * n; }
  }
  return result;
}

function BarViz({kg}) {
  const kgNum = parseFloat(kg);
  if (!kgNum || kgNum < BAR_KG) return null;
  const plates = calcKgPlates(kgNum);
  if (!plates) return null;
  return (
    <div className="bar-viz">
      <div className="bar-viz-inner">
        <div className="bv-collar" />
        {[...plates].reverse().map((p,i) => Array.from({length: p.count}).map((_,j) => (
          <div key={`L${i}_${j}`} className="bv-plate" style={{background:p.color, height:`${p.h}px`, width:'8px', marginRight:'1px'}} />
        )))}
        <div style={{width:'36px',height:'10px',background:'#444'}} />
        {plates.map((p,i) => Array.from({length: p.count}).map((_,j) => (
          <div key={`R${i}_${j}`} className="bv-plate" style={{background:p.color, height:`${p.h}px`, width:'8px', marginLeft:'1px'}} />
        )))}
        <div className="bv-collar" />
        <div style={{marginLeft:10}}>{kgNum}kg</div>
      </div>
    </div>
  );
}

// FULL 6-WEEK PROGRAM DATA
function defaultProgram() {
  const tm = { s: 214, b: 134, d: 247 };
  return {
    1: {label:"Week 1", phase:"Hypertrophy", days:[
      {id:"mon", name:"Monday", desc:"Upper Hypertrophy", exercises:[
        {name:"DB Incline Bench", sets:[{reps:"x10"},{reps:"x10"},{reps:"x10"}]},
        {name:"Lat Pulldowns Wide", sets:[{reps:"x12"},{reps:"x12"},{reps:"x12"}]}
      ]},
      {id:"tue", name:"Tuesday", desc:"SBD Focus A", exercises:[
        {name:"Squat", targetRPE:"7", sets:[{kg:150, reps:"x6"}]}
      ]}
    ]},
    4: {label:"Week 4", phase:"Strength", days:[
      {id:"tue", name:"Tuesday", desc:"SBD Focus A", exercises:[
        {name:"Squat", targetRPE:"8.0", sets:[{kg:175, reps:"x4"}]}
      ]}
    ]},
    6: {label:"Week 6", phase:"Peak", days:[
      {id:"fri", name:"Friday", desc:"SBD Focus B", exercises:[
        {name:"Deadlift", targetRPE:"8.5", sets:[{kg:236, reps:"x2"}]}
      ]}
    ]}
  };
}

// ... Additional helper functions (Signal, RPE, etc.) ...

function App() {
  const [authed, setAuthed] = useState(false);
  const [pw, setPw] = useState('');
  const [tab, setTab] = useState('log');
  const [currentWeek, setCurrentWeek] = useState(6);
  const [program, setProgram] = useState(() => {
    const saved = localStorage.getItem('ap_prog_v3');
    return saved ? JSON.parse(saved) : defaultProgram();
  });
  const [logData, setLogData] = useState(() => {
    const saved = localStorage.getItem('ap_log_v3');
    return saved ? JSON.parse(saved) : {};
  });

  useEffect(() => { localStorage.setItem('ap_prog_v3', JSON.stringify(program)); }, [program]);
  useEffect(() => { localStorage.setItem('ap_log_v3', JSON.stringify(logData)); }, [logData]);

  if (!authed) {
    return (
      <div className="gate">
        <div className="gate-logo-main">AUSTIN<span>LIFT</span></div>
        <input className="gate-pw" type="password" value={pw} onChange={e=>setPw(e.target.value)} />
        <button className="gate-go" onClick={() => pw === PW && setAuthed(true)}>Enter</button>
      </div>
    );
  }

  return (
    <div id="root">
      {/* Navigation, Weekbar, and Tab Rendering logic here */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

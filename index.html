<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Austin Powerlifting LBS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111214; --s1: #18191c; --s2: #1f2024; --s3: #26272c; --s4: #2e2f35;
  --border: #2e2f35; --border2: #3a3b42; --text: #e8e8ea; --muted: #595b63;
  --dim: #38393f; --accent: #d42b2b; --accent-bright: #ff3333;
  --accent-dim: rgba(212,43,43,.15); --accent-border: rgba(212,43,43,.35);
  --orange: #e84a1a; --red: #ff3333; --green: #3ecf6e; --yellow: #e8b84b; --blue: #4a9eff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column}
.topbar{background:var(--s1);border-bottom:1px solid var(--border);border-top:3px solid var(--accent);padding:0 20px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;height:55px}
.topbar-brand{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--text);display:flex;align-items:center;padding-right:24px;border-right:1px solid var(--border)}
.topbar-brand em{color:var(--accent);font-style:normal}
.topbar-nav{display:flex;align-items:stretch;flex:1;overflow-x:auto}
.tnav{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;padding:0 18px;text-transform:uppercase;border-bottom:3px solid transparent;white-space:nowrap}
.tnav.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{flex:1;padding:16px 20px;max-width:1000px;width:100%;margin:0 auto}
.day-card{border:1px solid var(--border);border-left:3px solid var(--dim);margin-bottom:8px;background:var(--s1)}
.day-hdr{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer}
.ex-row{display:grid;grid-template-columns:200px 80px repeat(4,1fr) 80px 80px 32px;gap:0;border-bottom:1px solid #1a1a1a;align-items:start;padding:6px 0}
.kg-input{background:var(--s3);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:4px 5px;width:54px;text-align:center;outline:none}
.bar-viz{margin:4px 6px 2px;padding:6px 8px;background:var(--s2);border:1px solid var(--border)}
.bv-plate{height:100%;border-radius:1px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:7px;font-weight:600;color:#000;min-width:6px}
</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// MAXES converted to LBS
const MAXES = { squat: 513, bench: 314, deadlift: 584 }; 

function defaultProgram() {
  const tm = { s: 471, b: 295, d: 543 }; 
  return {
    1: {label:"Week 1", phase:"Hypertrophy", days:[
      {id:"mon", name:"Monday", desc:"Upper Hypertrophy", exercises:[
        {name:"DB Incline Bench", sets:[{reps:"x10"},{reps:"x10"},{reps:"x10"},{reps:"x10"}]},
        {name:"Lat Pulldowns Wide", sets:[{reps:"x12"},{reps:"x12"},{reps:"x12"},{reps:"x12"}]},
        {name:"Military Press", sets:[{reps:"x10"},{reps:"x10"},{reps:"x10"}]},
        {name:"Tricep Pushdowns", sets:[{reps:"x15"},{reps:"x15"},{reps:"x15"},{reps:"x15"}]}
      ]},
      {id:"fri", name:"Friday", desc:"SBD Focus B", exercises:[
        {name:"Deadlift", targetRPE:"8.5", sets:[{kg:520, reps:"x2"},{kg:520, reps:"x2"},{kg:520, reps:"x2"}]}
      ]}
    ]},
    4: {label:"Week 4", phase:"Strength", days:[
      {id:"mon", name:"Monday", desc:"Bench + Upper", exercises:[
        {name:"Bench Press", targetRPE:"8", sets:[{kg:260, reps:"x5"},{kg:238, reps:"x5"},{kg:238, reps:"x5"}]},
        {name:"Pec Deck", sets:[{reps:"x15"},{reps:"x15"},{reps:"x15"}]}
      ]},
      {id:"tue", name:"Tuesday", desc:"SBD Focus A", exercises:[
        {name:"Squat", targetRPE:"8.0", sets:[{kg:385, reps:"x4"},{kg:385, reps:"x4"}]}
      ]}
    ]},
    6: {label:"Week 6", phase:"Peak", days:[
      {id:"fri", name:"Friday", desc:"Heavy Session", exercises:[
        {name:"Deadlift", targetRPE:"9", sets:[{kg:520, reps:"x1"}]}
      ]}
    ]}
  };
}

function App() {
  const [authed, setAuthed] = useState(true); // Security Gate REMOVED
  const [tab, setTab] = useState('log');
  const [currentWeek, setCurrentWeek] = useState(6);
  const [program, setProgram] = useState(() => JSON.parse(localStorage.getItem('ap_prog_v3')) || defaultProgram());
  const [logData, setLogData] = useState(() => JSON.parse(localStorage.getItem('ap_log_v3')) || {});

  useEffect(() => { localStorage.setItem('ap_prog_v3', JSON.stringify(program)); }, [program]);
  useEffect(() => { localStorage.setItem('ap_log_v3', JSON.stringify(logData)); }, [logData]);

  return (
    <div>
      <div className="topbar">
        <div className="topbar-brand">AUSTIN<em>LIFT</em> <span>LBS</span></div>
        <div className="topbar-nav">
          <button className={`tnav ${tab==='log'?'active':''}`} onClick={()=>setTab('log')}>Log</button>
        </div>
      </div>
      <div className="main">
        <h2>{program[currentWeek].label} - {program[currentWeek].phase}</h2>
        {program[currentWeek].days.map(day => (
          <div key={day.id} className="day-card">
            <div className="day-hdr">{day.name} - {day.desc}</div>
            <div style={{padding: '10px'}}>
              {day.exercises.map((ex, i) => (
                <div key={i} className="ex-row">
                  <div><strong>{ex.name}</strong></div>
                  <div>RPE: {ex.targetRPE || '—'}</div>
                  {ex.sets.map((s, si) => (
                    <div key={si} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                      <input className="kg-input" placeholder={s.kg || s.reps} />
                      <span style={{fontSize:'8px', color:'#555'}}>{s.reps || 'LBS'}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

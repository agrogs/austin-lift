<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG 2026 PL Program</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#111214;--s1:#18191c;--s2:#1f2024;--s3:#26272c;--bd:#2e2f35;--bd2:#3a3b42;--tx:#e8e8ea;--mt:#595b63;--dm:#38393f;--ac:#d42b2b;--ac2:#ff3d3d;--gn:#3ecf6e;--yl:#e8b84b;--rd:#ff3d3d}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
#root{min-height:100vh;display:flex;flex-direction:column}
/* GATE */
.gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;position:relative;overflow:hidden;background:#0a0a0b}
.gate-bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180,20,20,.18) 0%, transparent 60%),
  radial-gradient(ellipse 60% 40% at 50% 100%, rgba(0,0,0,.8) 0%, transparent 70%),
  repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(255,255,255,.015) 79px,rgba(255,255,255,.015) 80px),
  repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(255,255,255,.015) 79px,rgba(255,255,255,.015) 80px);
  pointer-events:none}
.gate-line-top{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent 0%,var(--ac) 30%,var(--ac2) 50%,var(--ac) 70%,transparent 100%)}
.gate-line-bot{position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,43,43,.3),transparent)}
.gate-logo{text-align:center;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0}
.gate-eyebrow{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:8px;color:rgba(212,43,43,.7);text-transform:uppercase;margin-bottom:12px;position:relative}
.gate-eyebrow::before,.gate-eyebrow::after{content:'';position:absolute;top:50%;width:30px;height:1px;background:rgba(212,43,43,.4)}
.gate-eyebrow::before{right:calc(100% + 10px)}.gate-eyebrow::after{left:calc(100% + 10px)}
.gate-ag{font-family:'Barlow Condensed',sans-serif;font-size:120px;font-weight:900;line-height:.85;color:var(--tx);letter-spacing:-4px;position:relative}
.gate-ag-shadow{position:absolute;inset:0;font-family:'Barlow Condensed',sans-serif;font-size:120px;font-weight:900;line-height:.85;letter-spacing:-4px;color:transparent;-webkit-text-stroke:1px rgba(212,43,43,.15);z-index:-1;transform:translate(3px,3px)}
.gate-year{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:700;color:var(--ac);letter-spacing:8px;margin-top:4px}
.gate-pl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:400;color:var(--mt);letter-spacing:14px;text-transform:uppercase;margin-top:6px}
.gate-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent);margin:4px auto 0}
.gate-form{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;z-index:1}
.gate-row{display:flex;box-shadow:0 0 30px rgba(212,43,43,.08)}
.gate-pw{background:rgba(30,30,32,.9);border:1px solid rgba(212,43,43,.25);border-right:none;color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:22px;padding:14px 18px;width:150px;text-align:center;letter-spacing:12px;outline:none;transition:border-color .15s,box-shadow .15s;backdrop-filter:blur(4px)}
.gate-pw:focus{border-color:var(--ac);box-shadow:0 0 0 1px rgba(212,43,43,.2) inset}
.gate-go{background:var(--ac);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:4px;padding:14px 28px;cursor:pointer;text-transform:uppercase;transition:background .12s,box-shadow .12s;position:relative;overflow:hidden}
.gate-go::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%)}
.gate-go:hover{background:var(--ac2);box-shadow:0 4px 20px rgba(212,43,43,.4)}
.gate-err{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--rd);letter-spacing:2px}
.gate-stats{display:flex;gap:0;border:1px solid rgba(212,43,43,.15);background:rgba(20,20,22,.6);backdrop-filter:blur(4px)}
.gate-stat{padding:10px 20px;text-align:center;border-right:1px solid rgba(212,43,43,.1)}
.gate-stat:last-child{border-right:none}
.gate-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--tx);line-height:1}
.gate-stat-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(212,43,43,.6);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
/* TOPBAR */
.topbar{background:var(--s1);border-top:3px solid var(--ac);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:stretch;padding:0 16px;position:sticky;top:0;z-index:100}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--tx);display:flex;align-items:center;padding-right:18px;border-right:1px solid var(--bd);white-space:nowrap;gap:5px}
.brand-red{color:var(--ac)}
.topnav{display:flex;align-items:stretch;flex:1;overflow-x:auto}
.tnav{background:none;border:none;border-bottom:3px solid transparent;color:var(--mt);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;padding:0 14px;text-transform:uppercase;white-space:nowrap}
.tnav:hover{color:var(--tx)}
.tnav.on{color:var(--ac);border-bottom-color:var(--ac)}
.topright{display:flex;align-items:center;gap:12px;margin-left:auto;padding-left:14px;border-left:1px solid var(--bd)}
.mi{text-align:center}.mi-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--mt);letter-spacing:1px}
.mi-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--tx)}
/* WEEK BAR */
.weekbar{background:var(--s1);border-bottom:1px solid var(--bd);display:flex;padding:0 10px;overflow-x:auto}
.wpill{background:none;border:none;border-bottom:3px solid transparent;color:var(--mt);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;padding:9px 12px 7px;text-transform:uppercase;white-space:nowrap}
.wpill:hover{color:var(--tx)}
.wpill.on{color:var(--ac);border-bottom-color:var(--ac)}
.wpill.has{color:var(--gn)}
.wpill.has.on{color:var(--ac);border-bottom-color:var(--ac)}
/* MAIN */
.main{flex:1;padding:14px 18px;max-width:1020px;width:100%;margin:0 auto}
.sh{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:2px;color:var(--tx);margin-bottom:12px;text-transform:uppercase;border-left:4px solid var(--ac);padding-left:10px}
/* DAY CARD */
.dc{border:1px solid var(--bd);border-left:3px solid var(--dm);margin-bottom:7px;background:var(--s1)}
.dc:hover{border-left-color:var(--ac)}
.dh{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;user-select:none}
.dh:hover{background:var(--s2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dm);flex-shrink:0}
.dot.done{background:var(--gn)}.dot.part{background:var(--yl)}
.di{flex:1}
.dn{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.dd{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--mt);letter-spacing:1px;margin-top:1px}
.rbadge{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 6px;border:1px solid}
.rbadge.lo{color:var(--gn);border-color:var(--gn)}.rbadge.mi{color:var(--yl);border-color:var(--yl)}.rbadge.hi{color:var(--rd);border-color:var(--rd)}
.chev{color:var(--mt);font-size:10px;transition:transform .2s}
.chev.op{transform:rotate(180deg)}
/* READINESS */
.rr{display:flex;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.rf{display:flex;flex-direction:column;padding:7px 12px;border-right:1px solid var(--bd)}
.rl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.ri{background:none;border:none;color:var(--ac);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;outline:none;width:80px}
.ri::placeholder{color:var(--dm)}
/* EX GRID */
.exwrap{overflow-x:auto}
.exgrid{min-width:680px}
.exhead{display:grid;grid-template-columns:185px 70px 1fr 1fr 1fr 1fr 66px 74px 26px;background:var(--s2);border-bottom:1px solid var(--bd)}
.exhc{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--mt);letter-spacing:1px;padding:5px 7px;text-transform:uppercase}
.exrow{display:grid;grid-template-columns:185px 70px 1fr 1fr 1fr 1fr 66px 74px 26px;border-bottom:1px solid #1c1d21;align-items:start}
.exrow:last-child{border-bottom:none}
/* NAME CELL */
.nc{padding:7px 8px;display:flex;flex-direction:column;gap:3px}
.exnbtn{background:none;border:none;color:var(--tx);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;text-align:left;padding:0}
.exnbtn:hover{color:var(--ac)}
.exnote{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--yl)}
.exacts{display:flex;gap:3px}
.exbtn{background:none;border:1px solid var(--bd);color:var(--mt);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 5px}
.exbtn:hover{border-color:var(--ac);color:var(--ac)}
.exbtn.del:hover{border-color:var(--rd);color:var(--rd)}
/* SET CELL */
.sc{padding:4px 4px;display:flex;flex-direction:column;gap:2px}
.st{display:flex;gap:2px;align-items:center}
.li{background:var(--s3);border:1px solid var(--bd);color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:11px;padding:4px 3px;width:50px;text-align:center;outline:none}
.li:focus{border-color:var(--ac)}
.sr{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--dm);text-align:center}
.dbtn{background:none;border:none;color:var(--dm);cursor:pointer;font-size:12px;line-height:1;padding:0 1px}
.dbtn:hover{color:var(--rd)}
/* RPE */
.rpec{padding:4px 4px;display:flex;align-items:flex-start;padding-top:6px}
.rpei{background:var(--s3);border:1px solid var(--bd);color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:12px;padding:4px 4px;width:52px;text-align:center;outline:none}
.rpei:focus{border-color:var(--ac)}
.rpei.g{border-color:var(--gn);color:var(--gn)}.rpei.y{border-color:var(--yl);color:var(--yl)}.rpei.r{border-color:var(--rd);color:var(--rd)}
/* SIGNAL */
.sigc{padding:4px 4px;display:flex;align-items:flex-start;padding-top:7px}
.sig{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 4px;border:1px solid;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.sig.up{color:var(--gn);border-color:var(--gn)}.sig.hold{color:var(--yl);border-color:var(--yl)}.sig.down{color:var(--rd);border-color:var(--rd)}.sig.none{color:var(--dm);border-color:var(--dm)}
/* BAR VIZ */
.bviz{margin:2px 8px 6px;padding:7px 10px;background:var(--s2);border:1px solid var(--bd)}
.brow{display:flex;align-items:center;gap:1px;overflow-x:auto;padding:3px 0}
.plate{display:inline-flex;align-items:center;justify-content:center;border-radius:2px;flex-shrink:0;font-family:'Share Tech Mono',monospace;font-size:7px;font-weight:700;writing-mode:vertical-rl;text-orientation:mixed}
.barbody{height:10px;background:linear-gradient(90deg,#2a2a2a,#555,#2a2a2a);border-radius:2px;flex-shrink:0;min-width:60px}
.collar{width:7px;height:22px;background:#444;border-radius:1px;flex-shrink:0}
.btotal{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--tx);margin-left:10px;white-space:nowrap;flex-shrink:0}
.bnote{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--mt);margin-top:3px}
/* ADD BTNS */
.addset{background:none;border:1px dashed var(--bd);color:var(--mt);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:3px 8px;margin:2px 7px;display:inline-block}
.addset:hover{border-color:var(--ac);color:var(--ac)}
.addex{background:none;border:1px dashed var(--bd);color:var(--mt);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:6px 12px;margin:5px 7px 8px}
.addex:hover{border-color:var(--ac);color:var(--ac)}
/* VIDEO */
.vidrow{display:flex;align-items:center;gap:7px;padding:6px 10px;border-top:1px solid var(--bd);flex-wrap:wrap}
.vidlbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--mt);letter-spacing:1px}
.vidadd{background:none;border:1px dashed var(--bd2);color:var(--mt);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:4px 8px}
.vidadd:hover{border-color:var(--ac);color:var(--ac)}
.vthumb{position:relative;display:inline-block}
.vthumb video{height:48px;width:auto;border:1px solid var(--bd2);display:block;cursor:pointer}
.vdel{position:absolute;top:-5px;right:-5px;background:var(--rd);border:none;color:#fff;cursor:pointer;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center}
/* REST */
.rest{padding:16px 13px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dm);letter-spacing:3px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--s2);border:1px solid var(--bd2);padding:20px;width:100%;max-width:490px;max-height:88vh;overflow-y:auto}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--tx);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--ac)}
.mf{margin-bottom:11px}
.mfl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.mfi{width:100%;background:var(--s3);border:1px solid var(--bd);color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 9px;outline:none}
.mfi:focus{border-color:var(--ac)}
.mfsel{width:100%;background:var(--s3);border:1px solid var(--bd);color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 9px;outline:none;cursor:pointer}
.macts{display:flex;gap:7px;margin-top:14px}
.msave{background:var(--ac);border:none;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;padding:9px 20px}
.msave:hover{background:var(--ac2)}
.mcancel{background:none;border:1px solid var(--bd2);color:var(--mt);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;padding:9px 12px}
.mcancel:hover{border-color:var(--tx);color:var(--tx)}
/* SUB */
.subcat{margin-bottom:11px}
.subcatlbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--bd)}
.subopts{display:flex;flex-wrap:wrap;gap:4px}
.subopt{background:var(--s3);border:1px solid var(--bd);color:var(--tx);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;padding:4px 9px}
.subopt:hover{border-color:var(--ac);color:var(--ac)}
/* VID OVERLAY */
.voverlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.vclose{position:absolute;top:14px;right:14px;background:none;border:1px solid var(--bd2);color:var(--tx);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;padding:5px 10px}
/* NEXT WEEK */
.nwwrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:calc(100vh - 125px);min-height:420px}
.nwchat{display:flex;flex-direction:column;gap:7px}
.nwmsgs{flex:1;background:var(--s1);border:1px solid var(--bd);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;min-height:260px}
.nwmsg{display:flex;flex-direction:column;gap:2px}
.nwmsg.user{align-items:flex-end}.nwmsg.ai{align-items:flex-start}
.nwrole{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--mt);letter-spacing:1.5px;text-transform:uppercase}
.nwbub{padding:8px 11px;font-size:13px;line-height:1.6;max-width:90%;white-space:pre-wrap}
.nwbub.user{background:var(--ac);color:#fff}.nwbub.ai{background:var(--s3);border:1px solid var(--bd2);color:var(--tx)}
.nwinrow{display:flex}
.nwta{flex:1;background:var(--s2);border:1px solid var(--bd);border-right:none;color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;padding:9px 12px;resize:none;outline:none;height:50px}
.nwta:focus{border-color:var(--ac)}
.nwsend{background:var(--ac);border:none;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;padding:0 16px}
.nwsend:hover{background:var(--ac2)}.nwsend:disabled{opacity:.35;cursor:not-allowed}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{background:var(--s2);border:1px solid var(--bd);color:var(--mt);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:8px;padding:4px 8px;letter-spacing:.5px}
.chip:hover{border-color:var(--ac);color:var(--ac)}
.nwright{display:flex;flex-direction:column;gap:7px;overflow-y:auto}
.nwcard{background:var(--s1);border:1px solid var(--bd);padding:12px}
.nwct{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--tx);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.nwcommit{background:var(--gn);border:none;color:#000;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;padding:6px 12px}
.nwcommit:hover{opacity:.85}
.nwdayname{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--mt);letter-spacing:2px;text-transform:uppercase;padding:4px 0 2px;border-bottom:1px solid var(--bd);margin-bottom:3px}
.nwexrow{display:flex;justify-content:space-between;padding:2px 0;font-family:'Share Tech Mono',monospace;font-size:10px}
.spin{width:13px;height:13px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
/* PROGRESS */
.ccard{background:var(--s1);border:1px solid var(--bd);padding:16px;margin-bottom:10px}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--tx);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.clegend{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap}
.cleg{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--mt);letter-spacing:1px;text-transform:uppercase}
.clegdot{width:7px;height:7px;border-radius:50%}
/* PLATES */
.pcwrap{max-width:560px}
.pcrow{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.pcinput{background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;padding:8px 12px;width:140px;outline:none;text-align:center}
.pcinput:focus{border-color:var(--ac)}
.pcunit{font-family:'Barlow Condensed',sans-serif;font-size:19px;color:var(--mt);font-weight:600}
.pcdisp{background:var(--s1);border:1px solid var(--bd);padding:16px;margin-bottom:12px}
.pctotal{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;color:var(--tx)}
.pcside{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--mt);margin-top:2px}
.pcjumps{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.pcj{background:var(--s2);border:1px solid var(--bd);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 9px}
.pcj.p{color:var(--gn);border-color:rgba(62,207,110,.4)}.pcj.m{color:var(--rd);border-color:rgba(255,61,61,.4)}
.pcj:hover{opacity:.75}
/* SCROLLBAR */
::-webkit-scrollbar{width:3px;height:3px}

// ── IPF PLATES (input in lbs, display IPF kg plates) ─────────────────────
var BAR_LBS = 44.09; // 20kg
var IPF = [
  {kg:25,  lbs:55.12, color:"#c8241e", tc:"#fff", h:58},
  {kg:20,  lbs:44.09, color:"#1a5db5", tc:"#fff", h:50},
  {kg:15,  lbs:33.07, color:"#d4a017", tc:"#000", h:42},
  {kg:10,  lbs:22.05, color:"#1e8c3a", tc:"#fff", h:34},

  {kg:2.5, lbs:5.51,  color:"#d8d8d8", tc:"#000", h:20},
  {kg:1.25,lbs:2.76,  color:"#888",    tc:"#fff", h:15}
];

function calcPlates(totalLbs) {
  var rem = (totalLbs - BAR_LBS) / 2;
  if (rem < 0) return null;
  var res = [];
  for (var i = 0; i < IPF.length; i++) {
    var n = Math.floor(rem / IPF[i].lbs + 0.01);
    if (n > 0) { res.push({p:IPF[i], n:n}); rem -= IPF[i].lbs * n; }
  }
  return res;
}

function BarViz(props) {
  var lbs = parseFloat(props.lbs);
  if (!lbs || lbs < BAR_LBS) return null;
  var plates = calcPlates(lbs);
  if (!plates) return null;
  var perside = plates.map(function(x){ return x.n+"x"+x.p.kg+"kg"; }).join("  ");
  var reversed = plates.slice().reverse();
  return (
    <div className="bviz">
      <div className="brow">
        {reversed.map(function(x,i){
          return Array.from({length:x.n}).map(function(_,j){
            return <div key={"L"+i+"_"+j} className="plate" style={{background:x.p.color,color:x.p.tc,height:x.p.h+"px",width:"11px",marginRight:"1px"}}>{x.p.kg}</div>;
          });
        })}
        <div className="collar"/>
        <div className="barbody"/>
        <div className="collar"/>
        {plates.map(function(x,i){
          return Array.from({length:x.n}).map(function(_,j){
            return <div key={"R"+i+"_"+j} className="plate" style={{background:x.p.color,color:x.p.tc,height:x.p.h+"px",width:"11px",marginLeft:"1px"}}>{x.p.kg}</div>;
          });
        })}
        <div className="btotal">{lbs} lbs</div>
      </div>
      <div className="bnote">per side: {perside}</div>

}

// ── RPE helpers ───────────────────────────────────────────────────────────
function rpeClass(actual, target) {
  if (!actual || !target) return "";
  var a = parseFloat(actual);
  var parts = String(target).replace(/[^0-9.]/g," ").trim().split(/\s+/);
  var t = parseFloat(parts[parts.length-1]);
  if (isNaN(a)||isNaN(t)) return "";
  var d = a - t;
  return d <= 0 ? "g" : d <= 1 ? "y" : "r";
}
function signal(actual, target) {
  if (!actual || !target) return null;
  var a = parseFloat(actual);
  var parts = String(target).replace(/[^0-9.]/g," ").trim().split(/\s+/);
  var t = parseFloat(parts[parts.length-1]);
  if (isNaN(a)||isNaN(t)) return null;
  var d = a - t;
  return d <= 0 ? "up" : d <= 1 ? "hold" : "down";
}
function SigBadge(props) {
  var s = signal(props.actual, props.target);
  if (!s) return <span className="sig none">--</span>;
  var labels = {up:"+5 lbs", hold:"HOLD", down:"-5 lbs"};
  return <span className={"sig "+s}>{labels[s]}</span>;
}

// ── EDIT MODAL ────────────────────────────────────────────────────────────
function EditModal(props) {
  var ex = props.ex; var onSave = props.onSave; var onClose = props.onClose;
  var init = JSON.parse(JSON.stringify(ex));
  init.sets = init.sets.map(function(s){ return {w:s.w||"",r:s.r||""}; });
  var f = useState(init); var form = f[0]; var setForm = f[1];
  function upd(key,val){ setForm(function(p){ var n=Object.assign({},p); n[key]=val; return n; }); }
  function updSet(i,key,val){ setForm(function(p){ var sets=p.sets.map(function(s,j){ return j===i?Object.assign({},s,{[key]:val}):s; }); return Object.assign({},p,{sets:sets}); }); }
  function remSet(i){ setForm(function(p){ return Object.assign({},p,{sets:p.sets.filter(function(_,j){ return j!==i; })}); }); }
  function addSet(){ setForm(function(p){ var last=p.sets[p.sets.length-1]||{r:"x10"}; return Object.assign({},p,{sets:p.sets.concat([Object.assign({},last)])}); }); }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={function(e){e.stopPropagation();}}>
        <div className="mtitle">Edit Exercise</div>
        <div className="mf"><div className="mfl">Name</div><input className="mfi" value={form.name} onChange={function(e){upd("name",e.target.value);}}/></div>
        <div className="mf"><div className="mfl">Target RPE</div><input className="mfi" value={form.rpe||""} placeholder="e.g. 7.5-8" onChange={function(e){upd("rpe",e.target.value||null);}}/></div>
        <div className="mf"><div className="mfl">Type</div><select className="mfsel" value={form.cp?"yes":"no"} onChange={function(e){upd("cp",e.target.value==="yes");}}>
          <option value="yes">Compound (RPE tracking + signal)</option>
          <option value="no">Accessory</option>
        </select></div>
        <div className="mf"><div className="mfl">Note</div><input className="mfi" value={form.note||""} placeholder="optional..." onChange={function(e){upd("note",e.target.value||undefined);}}/></div>
        <div className="mf">
          <div className="mfl">Sets</div>
          {form.sets.map(function(s,i){
            return (
              <div key={i} style={{display:"flex",gap:"6px",marginBottom:"4px",alignItems:"center"}}>
                <input className="mfi" style={{width:"72px"}} type="number" step="5" placeholder="lbs" value={s.w||""} onChange={function(e){updSet(i,"w",e.target.value?parseFloat(e.target.value):"");}}/>
                <input className="mfi" style={{width:"80px"}} placeholder="reps" value={s.r} onChange={function(e){updSet(i,"r",e.target.value);}}/>
                <button className="mcancel" style={{padding:"4px 7px"}} onClick={function(){remSet(i);}}>--</button>
              </div>
            );
          })}
          <button className="addset" onClick={addSet}>+ Set</button>
        </div>
        <div className="macts">
          <button className="msave" onClick={function(){onSave(form);}}>SAVE</button>
          <button className="mcancel" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── LOG TAB ───────────────────────────────────────────────────────────────
function LogTab(props) {
  var prog=props.prog; var setProg=props.setProg; var log=props.log; var setLog=props.setLog;
  var vids=props.vids; var setVids=props.setVids; var wk=props.wk; var setWk=props.setWk;

  var s1=useState({mon:true,tue:true,wed:false,thu:false,fri:true,sat:false,sun:false}); var open=s1[0]; var setOpen=s1[1];
  var s2=useState(null); var editM=s2[0]; var setEditM=s2[1];
  var s3=useState(null); var subM=s3[0]; var setSubM=s3[1];
  var s4=useState(null); var playV=s4[0]; var setPlayV=s4[1];

  var wdata = prog[wk];

  function lk(d,ei,si,f){ return "w"+wk+"_"+d+"_"+ei+"_"+si+"_"+f; }
  function rk(d,f){ return "r_w"+wk+"_"+d+"_"+f; }
  function gL(d,ei,si,f){ return log[lk(d,ei,si,f)]||""; }
  function sL(d,ei,si,f,v){ setLog(function(p){ var n=Object.assign({},p); n[lk(d,ei,si,f)]=v; return n; }); }
  function gR(d,f){ return log[rk(d,f)]||""; }
  function sR(d,f,v){ setLog(function(p){ var n=Object.assign({},p); n[rk(d,f)]=v; return n; }); }

  function dayStatus(day){
    if(day.isRest) return "rest";
    var comps=day.exercises.filter(function(e){return e.cp;});
    if(!comps.length) return "none";
    var logged=comps.filter(function(ex){
      var ei=day.exercises.indexOf(ex);
      return ex.sets.some(function(_,si){return gL(day.id,ei,si,"lbs")||gL(day.id,ei,0,"rpe");});
    });
    if(!logged.length) return "none";
    return logged.length<comps.length?"part":"done";
  }
  function dayFatigue(day){
    if(day.isRest) return null;
    var rpes=[];
    day.exercises.forEach(function(ex,ei){
      var v=gL(day.id,ei,0,"rpe"); if(v) rpes.push(parseFloat(v));
    });
    if(!rpes.length) return null;
    return (rpes.reduce(function(a,b){return a+b;},0)/rpes.length).toFixed(1);
  }
  function updateEx(dayId,exIdx,newEx){
    setProg(function(p){ var n=JSON.parse(JSON.stringify(p)); n[wk].days.find(function(d){return d.id===dayId;}).exercises[exIdx]=newEx; return n; });
  }
  function removeEx(dayId,exIdx){
    if(!confirm("Remove this exercise?")) return;
    setProg(function(p){ var n=JSON.parse(JSON.stringify(p)); n[wk].days.find(function(d){return d.id===dayId;}).exercises.splice(exIdx,1); return n; });
  }
  function addEx(dayId){
    setProg(function(p){ var n=JSON.parse(JSON.stringify(p)); n[wk].days.find(function(d){return d.id===dayId;}).exercises.push({name:"New Exercise",rpe:null,sets:[{r:"x10"},{r:"x10"},{r:"x10"}],cp:false}); return n; });
  }
  function addSet(dayId,exIdx){
    setProg(function(p){ var n=JSON.parse(JSON.stringify(p)); var ex=n[wk].days.find(function(d){return d.id===dayId;}).exercises[exIdx]; var last=ex.sets[ex.sets.length-1]; ex.sets.push(Object.assign({},last)); return n; });
  }
  function remSet(dayId,exIdx,si){
    setProg(function(p){ var n=JSON.parse(JSON.stringify(p)); var ex=n[wk].days.find(function(d){return d.id===dayId;}).exercises[exIdx]; if(ex.sets.length>1) ex.sets.splice(si,1); return n; });
  }
  function addVid(dayId,exIdx,files){
    Array.from(files).forEach(function(file){
      var url=URL.createObjectURL(file);
      var key="v_w"+wk+"_"+dayId+"_"+exIdx;
      setVids(function(p){ var n=Object.assign({},p); n[key]=(n[key]||[]).concat([{url:url,name:file.name}]); return n; });
    });
  }
  function remVid(dayId,exIdx,vi){
    var key="v_w"+wk+"_"+dayId+"_"+exIdx;
    setVids(function(p){ var n=Object.assign({},p); n[key]=(n[key]||[]).filter(function(_,i){return i!==vi;}); return n; });
  }

  return (
    <div>
      <div className="weekbar">
        {Object.keys(prog).map(function(wn){
          var wInt=parseInt(wn); var wd=prog[wn];
          var has=wd.days.some(function(d){return !d.isRest&&d.exercises.some(function(ex,ei){return ex.sets.some(function(_,si){return log["w"+wInt+"_"+d.id+"_"+ei+"_"+si+"_lbs"]||log["w"+wInt+"_"+d.id+"_"+ei+"_0_rpe"];});});});
          return <button key={wn} className={"wpill"+(wk===wInt?" on":"")+(has&&wk!==wInt?" has":"")} onClick={function(){setWk(wInt);}}>W{wn} -- {wd.phase}</button>;
        })}
      </div>
      <div className="main">
        <div className="sh">{wdata?wdata.label:""}</div>
        {wdata&&wdata.days.map(function(day){
          var isO=open[day.id]!==false;
          var st=dayStatus(day); var fat=dayFatigue(day); var fn=parseFloat(fat)||0;
          var fatCls=fn>=8.5?"hi":fn>=7.5?"mi":"lo";
          return (
            <div key={day.id} className="dc">
              <div className="dh" onClick={function(){setOpen(function(p){var n=Object.assign({},p);n[day.id]=!isO;return n;});}}>
                <div className={"dot"+(st==="done"?" done":st==="part"?" part":"")}/>
                <div className="di">
                  <div className="dn">{day.name}</div>
                  <div className="dd">{day.desc}</div>
                </div>
                {fat&&<span className={"rbadge "+fatCls}>avg {fat}</span>}
                <div className={"chev"+(isO?" op":"")}>v</div>
              </div>
              {isO&&(
                <div>
                  {!day.isRest&&(
                    <div className="rr">
                      {[["whoop","Whoop %"],["sleep","Sleep"],["bw","BW (lbs)"]].map(function(f){
                        return <div key={f[0]} className="rf"><div className="rl">{f[1]}</div><input className="ri" type="number" placeholder="--" value={gR(day.id,f[0])} onChange={function(e){sR(day.id,f[0],e.target.value);}}/></div>;
                      })}
                    </div>
                  )}
                  {day.isRest?<div className="rest">// REST DAY</div>:(
                    <div>
                      <div className="exwrap">
                        <div className="exgrid">
                          <div className="exhead">
                            {["Exercise","Target RPE","Set 1","Set 2","Set 3","Set 4","Act RPE","Signal",""].map(function(h,i){return <div key={i} className="exhc">{h}</div>;})}
                          </div>
                          {day.exercises.map(function(ex,exIdx){
                            var actRPE=gL(day.id,exIdx,0,"rpe");
                            var rc=rpeClass(actRPE,ex.rpe);
                            var bestW=null;
                            for(var si=0;si<Math.min(ex.sets.length,4);si++){
                              var logged=gL(day.id,exIdx,si,"lbs");
                              var fb=ex.sets[si]&&ex.sets[si].w?ex.sets[si].w:null;
                              var v=parseFloat(logged||fb)||0;
                              if(v&&(!bestW||v>bestW)) bestW=v;
                            }
                            return (
                              <div key={exIdx}>
                                <div className="exrow">
                                  <div className="nc">
                                    <button className="exnbtn" onClick={function(){setEditM({dayId:day.id,exIdx:exIdx,ex:ex});}}>{ex.name}</button>
                                    {ex.note&&<div className="exnote">{ex.note}</div>}
                                    <div className="exacts">
                                      <button className="exbtn" onClick={function(){setSubM({dayId:day.id,exIdx:exIdx,exName:ex.name});}}>SUB</button>
                                      <button className="exbtn" onClick={function(){setEditM({dayId:day.id,exIdx:exIdx,ex:ex});}}>EDIT</button>
                                      <button className="exbtn del" onClick={function(){removeEx(day.id,exIdx);}}>X</button>
                                    </div>
                                  </div>
                                  <div style={{padding:"7px 7px",fontFamily:"Share Tech Mono,monospace",fontSize:"10px",color:"var(--mt)"}}>{ex.rpe||"--"}</div>
                                  {[0,1,2,3].map(function(si){
                                    var s=ex.sets[si];
                                    if(!s) return <div key={si} className="sc">{si===ex.sets.length&&<button className="addset" style={{margin:"2px 0",padding:"3px 6px",fontSize:"8px"}} onClick={function(){addSet(day.id,exIdx);}}>+</button>}</div>;
                                    var logW=gL(day.id,exIdx,si,"lbs");
                                    return (
                                      <div key={si} className="sc">
                                        <div className="st">
                                          <input className="li" type="number" step="5" placeholder={s.w?String(s.w):"lbs"} value={logW} onChange={function(e){sL(day.id,exIdx,si,"lbs",e.target.value);}}/>
                                          <button className="dbtn" onClick={function(){remSet(day.id,exIdx,si);}}>x</button>
                                        </div>
                                        <div className="sr">{s.r}</div>
                                      </div>
                                    );
                                  })}
                                  <div className="rpec">
                                    {ex.cp?<input className={"rpei "+rc} type="number" step="0.5" placeholder="RPE" value={actRPE} onChange={function(e){sL(day.id,exIdx,0,"rpe",e.target.value);}}/>:<span style={{color:"var(--dm)",fontFamily:"Share Tech Mono,monospace",fontSize:"9px"}}>--</span>}
                                  </div>
                                  <div className="sigc">

// ── NEXT WEEK ─────────────────────────────────────────────────────────────
function NextWeekTab(props) {
  var prog=props.prog; var setProg=props.setProg; var log=props.log; var wk=props.wk;
  var token=props.token; var workerUrl=props.workerUrl;
  var sm=useState([{role:"ai",text:"Yo Austin. I have all your RPE data, weights, and progression rules. Tell me what you want for next week or use one of the quick options."}]); var msgs=sm[0]; var setMsgs=sm[1];
  var si=useState(""); var inp=si[0]; var setInp=si[1];
  var sl=useState(false); var loading=sl[0]; var setLoading=sl[1];
  var sp=useState(null); var preview=sp[0]; var setPreview=sp[1];
  var sj=useState(null); var pendingJ=sj[0]; var setPendingJ=sj[1];
  var msgsRef=useRef(null);
  var nextWk=wk+1;

  useEffect(function(){if(msgsRef.current)msgsRef.current.scrollTop=99999;},[msgs,loading]);

  function buildCtx(){
    var c="ATHLETE: Austin Grogan\nCOMP MAXES: Squat 513 lbs | Bench 314 lbs | Deadlift 584 lbs\n";
    c+="STYLE: Low-bar squat, sumo deadlift\nRULES: Off-season. No RPE 9+. Sunday max RPE 6.5.\n";
    c+="PROGRESSION: Under target RPE = +5 lbs. 0.5-1 over = hold. 1.5+ over = -5 to -10 lbs.\n";
    c+="WEIGHTS IN LBS\nCURRENT WEEK: "+wk+(prog[wk]?" ("+prog[wk].label+" / "+prog[wk].phase+")":"")+"\n\nLOGGED THIS WEEK:\n";
    if(prog[wk]){
      prog[wk].days.forEach(function(day){
        if(day.isRest)return;
        c+="\n"+day.name+" ("+day.desc+"):\n";
        var whoop=log["r_w"+wk+"_"+day.id+"_whoop"];
        if(whoop)c+="  Whoop: "+whoop+"%\n";
        day.exercises.forEach(function(ex,ei){
          if(!ex.cp)return;
          var rpe=log["w"+wk+"_"+day.id+"_"+ei+"_0_rpe"];
          var sets=ex.sets.map(function(_,si){return log["w"+wk+"_"+day.id+"_"+ei+"_"+si+"_lbs"];}).filter(Boolean);
          if(sets.length||rpe)c+="  "+ex.name+" -- target RPE "+(ex.rpe||"N/A")+" -- "+(sets.length?sets.join("/")+' lbs':"not logged")+" -- actual RPE: "+(rpe||"not logged")+"\n";
        });
      });
    }
    return c;
  }

  function send(override){
    var msg=override||inp.trim();
    if(!msg||loading)return;
    setInp("");
    setMsgs(function(p){return p.concat([{role:"user",text:msg}]);});
    setLoading(true);
    var ctx=buildCtx();
    var sys="You are an elite powerlifting coach AI for Austin Grogan.\n\nWhen generating a program respond EXACTLY in this format:\n\nCOACHING SUMMARY:\n[2-3 sentences]\n\nPROGRAM_JSON:\n{json}\n\nJSON structure: {\"label\":\"Week N\",\"phase\":\"...\",\"days\":[{\"id\":\"mon\",\"name\":\"Monday\",\"desc\":\"...\",\"isRest\":false,\"exercises\":[{\"name\":\"...\",\"rpe\":\"7.5\",\"sets\":[{\"w\":225,\"r\":\"x5\"},{\"w\":225,\"r\":\"x5\"}],\"cp\":true}]},{\"id\":\"thu\",\"name\":\"Thursday\",\"desc\":\"Rest\",\"isRest\":true,\"exercises\":[]}]}\n\nInclude ALL 7 days: mon tue wed thu fri sat sun. Rest days have isRest:true and exercises:[]. Weights in LBS. Accessories have cp:false and no w field needed.";
    var history=msgs.map(function(m){return {role:m.role==="ai"?"assistant":"user",content:m.text};});
    history.push({role:"user",content:ctx+"\n\nRequest: "+msg});
    fetch(workerUrl+"/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:JSON.stringify({system:sys,messages:history})
    })
    .then(function(r){return r.json();})
    .then(function(data){
      var text=data.response||data.error||"No response.";
      var match=text.match(/PROGRAM_JSON:\s*(\{[\s\S]*\})\s*$/);
      if(!match)match=text.match(/PROGRAM_JSON:\s*(\{[\s\S]*\})/);
      if(match){
        try{
          var parsed=JSON.parse(match[1]);
          setPendingJ(parsed);
          var prev=parsed.days.filter(function(d){return !d.isRest;}).map(function(d){
            var lines=d.exercises.filter(function(e){return e.cp;}).map(function(e){
              return "  "+e.name+": "+e.sets.map(function(s){return (s.w?s.w+" lbs ":"")+s.r;}).join(" | ")+"  @RPE "+(e.rpe||"--");
            });
            return lines.length?d.name.toUpperCase()+" -- "+d.desc+"\n"+lines.join("\n"):null;
          }).filter(Boolean).join("\n\n");
          setPreview(prev);
          var coaching=text.split("PROGRAM_JSON:")[0].replace("COACHING SUMMARY:","").trim();
          setMsgs(function(p){return p.concat([{role:"ai",text:coaching||"Here's your week:"}]);});
        }catch(e){setMsgs(function(p){return p.concat([{role:"ai",text:text}]);});}
      }else{setMsgs(function(p){return p.concat([{role:"ai",text:text}]);})}
      setLoading(false);
    })
    .catch(function(e){
      setMsgs(function(p){return p.concat([{role:"ai",text:"Worker error: "+(e.message||"check your Worker is deployed and URL is correct")}]);});
      setLoading(false);
    });
  }

  function commit(){
    if(!pendingJ)return;
    var target=nextWk<=6?nextWk:7;
    setProg(function(p){var n=JSON.parse(JSON.stringify(p));n[target]=pendingJ;return n;});
    setPreview(null);setPendingJ(null);
    setMsgs(function(p){return p.concat([{role:"ai",text:"Week "+target+" locked in. Go to LOG tab to train."}]);});
  }

  var chips=["Generate Week "+nextWk+" from this week's RPE","Build a deload week","Push SBD intensity up","More hypertrophy, less SBD","Same structure, adjust weights only"];

  return (
    <div className="main">
      <div className="sh">Next Week -- AI Builder</div>
      <div className="nwwrap">
        <div className="nwchat">
          <div className="nwmsgs" ref={msgsRef}>
            {msgs.map(function(m,i){
              return <div key={i} className={"nwmsg "+m.role}><div className="nwrole">{m.role==="ai"?"COACH":"YOU"}</div><div className={"nwbub "+m.role}>{m.text}</div></div>;
            })}
            {loading&&<div className="nwmsg ai"><div className="nwrole">COACH</div><div className="nwbub ai"><div className="spin"></div></div></div>}
          </div>
          <div className="nwinrow">
            <textarea className="nwta" placeholder="Tell the coach what you want for next week..." value={inp} onChange={function(e){setInp(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(null);}}}/>
            <button className="nwsend" disabled={loading||!inp.trim()} onClick={function(){send(null);}}>SEND</button>
          </div>
          <div className="chips">{chips.map(function(q){return <button key={q} className="chip" onClick={function(){send(q);}}>{q}</button>;})}</div>
        </div>
        <div className="nwright">
          {preview?(
            <div className="nwcard">
              <div className="nwct">Week {nextWk} Preview<button className="nwcommit" onClick={commit}>COMMIT --&gt;</button></div>
              <pre style={{fontFamily:"Share Tech Mono,monospace",fontSize:"10px",color:"var(--tx)",lineHeight:"1.7",whiteSpace:"pre-wrap"}}>{preview}</pre>
            </div>
          ):(
            <div className="nwcard" style={{opacity:.45}}>
              <div className="nwct">Week {nextWk} Preview</div>
              <div style={{fontFamily:"Share Tech Mono,monospace",fontSize:"10px",color:"var(--mt)"}}>Ask the coach to generate a program -- it will appear here before committing.</div>
            </div>
          )}
          <div className="nwcard">
            <div className="nwct" style={{fontSize:"13px"}}>W{wk} Compound Summary</div>
            {prog[wk]&&prog[wk].days.filter(function(d){return !d.isRest;}).map(function(day){
              var comps=day.exercises.filter(function(e){return e.cp;});
              if(!comps.length)return null;
              return (
                <div key={day.id} style={{marginBottom:"9px"}}>
                  <div className="nwdayname">{day.name}</div>
                  {comps.map(function(ex){
                    var ei=day.exercises.indexOf(ex);
                    var rpe=log["w"+wk+"_"+day.id+"_"+ei+"_0_rpe"];
                    var lbs=ex.sets.map(function(_,si){return log["w"+wk+"_"+day.id+"_"+ei+"_"+si+"_lbs"];}).filter(Boolean);
                    var s=signal(rpe,ex.rpe);
                    var sc=s==="up"?"var(--gn)":s==="hold"?"var(--yl)":s==="down"?"var(--rd)":"var(--dm)";
                    return <div key={ei} className="nwexrow"><span style={{color:"var(--tx)"}}>{ex.name}</span><span style={{color:"var(--mt)"}}>{lbs.length?lbs.join("/")+' lbs':"--"}{rpe?" @ "+rpe:""}{s&&<span style={{marginLeft:"5px",color:sc}}>{s==="up"?"+5":s==="hold"?"HOLD":"-5"}</span>}</span></div>;
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PROGRESS TAB ──────────────────────────────────────────────────────────
function ProgressTab(props) {
  var prog=props.prog; var log=props.log;
  var colors={squat:"#d42b2b",bench:"#e8e8ea",deadlift:"#3ecf6e"};
  function getData(){
    var lifts={squat:[],bench:[],deadlift:[]};
    Object.keys(prog).forEach(function(wn){
      var wd=prog[wn]; var wInt=parseInt(wn);
      wd.days.forEach(function(day){
        day.exercises.forEach(function(ex,ei){
          if(!ex.cp)return;
          var nm=ex.name.toLowerCase();
          var key=null;
          if(nm.indexOf("squat")>-1&&nm.indexOf("pause")<0&&nm.indexOf("speed")<0)key="squat";
          else if(nm.indexOf("bench")>-1&&nm.indexOf("pause")<0)key="bench";
          else if(nm.indexOf("deadlift")>-1&&nm.indexOf("pause")<0&&nm.indexOf("speed")<0)key="deadlift";
          if(!key)return;
          var best=0;
          ex.sets.forEach(function(_,si){
            var logged=log["w"+wInt+"_"+day.id+"_"+ei+"_"+si+"_lbs"];
            var fb=ex.sets[si]&&ex.sets[si].w?ex.sets[si].w:null;
            var v=parseFloat(logged||fb)||0;
            if(v>best)best=v;
          });
          if(best>0)lifts[key].push({week:wInt,lbs:best});
        });
      });
    });
    return lifts;
  }
  var data=getData();
  var all=[];Object.values(data).forEach(function(pts){pts.forEach(function(p){all.push(p.lbs);});});
  var minV=all.length?Math.min.apply(null,all)-20:100;
  var maxV=all.length?Math.max.apply(null,all)+20:600;
  var W=640;var H=200;var PAD=52;
  return (
    <div className="main">
      <div className="sh">Progress</div>
      <div className="ccard">
        <div className="ctitle">Compound Peak Loads (lbs)</div>
        <svg viewBox={"0 0 "+(W+PAD)+" "+(H+38)} style={{width:"100%",overflow:"visible"}}>
          {[0,.25,.5,.75,1].map(function(t){
            var y=H-t*H+10; var val=Math.round(minV+t*(maxV-minV));
            return <g key={t}><line x1={PAD} y1={y} x2={W+PAD} y2={y} stroke="#1c1d21" strokeWidth="1"/><text x={PAD-5} y={y+4} fill="#3a3b42" fontSize="9" fontFamily="Share Tech Mono,monospace" textAnchor="end">{val}</text></g>;
          })}
          {[1,2,3,4,5,6].map(function(w){
            var x=PAD+(w-1)/(6-1)*W;
            return <g key={w}><text x={x} y={H+24} fill="#3a3b42" fontSize="9" fontFamily="Share Tech Mono,monospace" textAnchor="middle">W{w}</text></g>;
          })}
          {Object.entries(data).map(function(entry){
            var lift=entry[0];var pts=entry[1];
            if(!pts.length)return null;
            var color=colors[lift];
            var plotPts=pts.map(function(p){return {x:PAD+(p.week-1)/(6-1)*W,y:H-((p.lbs-minV)/(maxV-minV))*H+10};});
            return <g key={lift}>
              <polyline points={plotPts.map(function(p){return p.x+","+p.y;}).join(" ")} fill="none" stroke={color} strokeWidth="1.5" strokeOpacity=".7"/>
              {plotPts.map(function(p,i){return <g key={i}><circle cx={p.x} cy={p.y} r="3.5" fill={color}/><text x={p.x} y={p.y-7} fill={color} fontSize="9" fontFamily="Share Tech Mono,monospace" textAnchor="middle">{pts[i].lbs}</text></g>;})}
            </g>;
          })}
        </svg>
        <div className="clegend">{Object.entries(colors).map(function(e){return <div key={e[0]} className="cleg"><div className="clegdot" style={{background:e[1]}}></div>{e[0]}</div>;})}</div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App() {
  var s1=useState(null);  var token=s1[0];  var setToken=s1[1];   // null=loading, ""=logged out, "abc..."=authed
  var s2=useState("");   var pw=s2[0];      var setPw=s2[1];
  var s3=useState(false);var err=s3[0];     var setErr=s3[1];
  var s4=useState("log");var tab=s4[0];     var setTab=s4[1];
  var s5=useState(6);    var wk=s5[0];      var setWk=s5[1];
  var s6=useState({});   var log=s6[0];     var setLog=s6[1];
  var s7=useState(null); var prog=s7[0];    var setProg=s7[1];     // null = not loaded yet
  var s8=useState({});   var vids=s8[0];    var setVids=s8[1];
  var s9=useState("");   var syncMsg=s9[0]; var setSyncMsg=s9[1];
  var s10=useState(false);var booting=s10[0];var setBooting=s10[1];

  // On mount: check localStorage for saved token, try to load data
  useEffect(function(){
    var saved = localStorage.getItem("ap_token");
    if (saved) {
      setToken(saved);
      loadData(saved);
    } else {
      setToken(""); // not logged in
    }
  }, []);

  // Auto-save log + prog to Worker whenever they change (debounced)
  var saveTimer = useRef(null);
  useEffect(function(){
    if (!token || !prog) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(function(){
      saveData(token, log, prog);
    }, 1500);
  }, [log, prog]);

  function loadData(t) {
    setBooting(true);
    fetch(WORKER_URL + "/data", {
      headers: { "Authorization": "Bearer " + t }
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.error) { setToken(""); localStorage.removeItem("ap_token"); setBooting(false); return; }
      setLog(data.log || {});
      setProg(data.prog || makeProgram());
      setBooting(false);
    })
    .catch(function(){
      // Worker unreachable — fall back to localStorage
      try {
        var l = localStorage.getItem("ap5_log"); if(l) setLog(JSON.parse(l));
        var p = localStorage.getItem("ap5_prog"); if(p) setProg(JSON.parse(p)); else setProg(makeProgram());
      } catch(e){ setProg(makeProgram()); }
      setBooting(false);
      setSyncMsg("Worker offline — using local data");
    });
  }

  function saveData(t, logData, progData) {
    fetch(WORKER_URL + "/data", {
      method: "POST",
      headers: { "Authorization": "Bearer " + t, "Content-Type": "application/json" },
      body: JSON.stringify({ log: logData, prog: progData })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.ok) setSyncMsg("synced " + new Date().toLocaleTimeString());
      else setSyncMsg("sync error");
    })
    .catch(function(){
      // fall back to localStorage
      try { localStorage.setItem("ap5_log", JSON.stringify(logData)); localStorage.setItem("ap5_prog", JSON.stringify(progData)); } catch(e){}
      setSyncMsg("offline — saved locally");
    });
  }

  function tryLogin() {
    if (!pw) return;
    fetch(WORKER_URL + "/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.token) {
        localStorage.setItem("ap_token", data.token);
        setToken(data.token);
        loadData(data.token);
      } else {
        setErr(true); setTimeout(function(){ setErr(false); }, 1400);
      }
    })
    .catch(function(){
      // Worker down — fall back to hardcoded password
      if (pw === "1414") {
        var fallbackToken = "offline";
        localStorage.setItem("ap_token", fallbackToken);
        setToken(fallbackToken);
        try { var l=localStorage.getItem("ap5_log"); if(l) setLog(JSON.parse(l)); var p=localStorage.getItem("ap5_prog"); if(p) setProg(JSON.parse(p)); else setProg(makeProgram()); } catch(e){ setProg(makeProgram()); }
        setSyncMsg("Worker offline — using local data");
      } else {
        setErr(true); setTimeout(function(){ setErr(false); }, 1400);
      }
    });
  }

  // Still checking token
  if (token === null) {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
        <div className="spin" style={{width:"20px",height:"20px",borderWidth:"3px"}}></div>
      </div>
    );
  }

  // Not logged in
  if (!token) {
    return (
      <div className="gate">
        <div className="gate-bg"></div>
        <div className="gate-line-top"></div>
        <div className="gate-line-bot"></div>
        <div className="gate-logo">
          <div className="gate-eyebrow">Austin Grogan</div>
          <div className="gate-ag" style={{position:"relative"}}>
            <span style={{display:"block"}}>AG</span>
            <div className="gate-ag-shadow">AG</div>
          </div>
          <div className="gate-year">2026</div>
          <div className="gate-divider"></div>
          <div className="gate-pl">Powerlifting Program</div>
        </div>
        <div className="gate-stats">
          <div className="gate-stat"><div className="gate-stat-val">513</div><div className="gate-stat-lbl">Squat</div></div>
          <div className="gate-stat"><div className="gate-stat-val">314</div><div className="gate-stat-lbl">Bench</div></div>
          <div className="gate-stat"><div className="gate-stat-val">584</div><div className="gate-stat-lbl">Dead</div></div>
          <div className="gate-stat"><div className="gate-stat-val">1411</div><div className="gate-stat-lbl">Total</div></div>
        </div>
        <div className="gate-form">
          <div className="gate-row">
            <input className="gate-pw" type="password" placeholder="----" value={pw}
              onChange={function(e){setPw(e.target.value);}}
              onKeyDown={function(e){if(e.key==="Enter")tryLogin();}}
              autoFocus/>
            <button className="gate-go" onClick={tryLogin}>ENTER</button>
          </div>
          {err&&<div className="gate-err">// ACCESS DENIED</div>}
        </div>
      </div>
    );
  }

  // Loading data after login
  if (booting || !prog) {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",flexDirection:"column",gap:"12px"}}>
        <div className="spin" style={{width:"20px",height:"20px",borderWidth:"3px"}}></div>
        <div style={{fontFamily:"Share Tech Mono,monospace",fontSize:"11px",color:"var(--mt)",letterSpacing:"2px"}}>LOADING DATA...</div>
      </div>
    );
  }

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div className="topbar">
        <div className="brand">AG <span className="brand-red">2026</span></div>
        <div className="topnav">
          {[["log","LOG"],["nextweek","NEXT WEEK"],["coach","COACH"]].map(function(item){
            return <button key={item[0]} className={"tnav"+(tab===item[0]?" on":"")} onClick={function(){setTab(item[0]);}}>{item[1]}</button>;
          })}
        </div>
        <div className="topright">
          {syncMsg && <span style={{fontFamily:"Share Tech Mono,monospace",fontSize:"8px",color:"var(--mt)",letterSpacing:"1px"}}>{syncMsg}</span>}
          {[["SQ","513"],["BP","314"],["DL","584"]].map(function(m){
            return <div key={m[0]} className="mi"><div className="mi-label">{m[0]}</div><div className="mi-val">{m[1]}</div></div>;
          })}
        </div>
      </div>
      {tab==="log"&&<LogTab prog={prog} setProg={setProg} log={log} setLog={setLog} vids={vids} setVids={setVids} wk={wk} setWk={setWk}/>}
      {tab==="nextweek"&&<NextWeekTab prog={prog} setProg={setProg} log={log} wk={wk} token={token} workerUrl={WORKER_URL}/>}
      {tab==="coach"&&<CoachTab token={token} workerUrl={WORKER_URL} prog={prog} log={log} wk={wk}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Austin Powerlifting</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Austin Lift">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111214; --s1: #18191c; --s2: #1f2024; --s3: #26272c; --s4: #2e2f35;
  --border: #2e2f35; --border2: #3a3b42; --text: #e8e8ea; --muted: #595b63;
  --dim: #38393f; --accent: #d42b2b; --accent-bright: #ff3333;
  --accent-dim: rgba(212,43,43,.15); --accent-border: rgba(212,43,43,.35);
  --orange: #e84a1a; --red: #ff3333; --green: #3ecf6e; --yellow: #e8b84b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#root{height:100%;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);border-top:3px solid var(--accent);padding:0 20px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;height:55px}
.topbar-brand{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--text);display:flex;align-items:center;padding-right:16px;border-right:1px solid var(--border)}
.topbar-brand em{color:var(--accent);font-style:normal}
.topbar-nav{display:flex;flex:1;overflow-x:auto}
.tnav{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;padding:0 15px;text-transform:uppercase;border-bottom:3px solid transparent;white-space:nowrap}
.tnav.active{color:var(--accent);border-bottom-color:var(--accent)}

.topbar-right{display:flex;align-items:center;padding-left:16px;border-left:1px solid var(--border)}
.max-item{text-align:center;margin-left:15px}
.max-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase}
.max-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700}

/* ── MAIN ── */
.main{flex:1;padding:16px;max-width:1000px;width:100%;margin:0 auto}
.sec-head{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;border-left:4px solid var(--accent);padding-left:10px}

/* ── PLATE VIZ ── */
.bar-viz{margin:10px 0;padding:12px;background:var(--s2);border:1px solid var(--border);border-radius:4px}
.bar-viz-inner{display:flex;align-items:center;gap:2px;justify-content:center;height:60px}
.bv-plate{border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:8px;font-weight:900;color:rgba(0,0,0,0.7);width:10px;flex-shrink:0}
.bv-collar{width:6px;height:24px;background:#666;border-radius:1px}
.bv-bar-center{width:40px;height:12px;background:linear-gradient(180deg,#333,#777,#333);border-radius:2px}
.bv-info{text-align:center;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)}

/* ── TABLES ── */
.ex-row{display:grid;grid-template-columns:150px 70px repeat(4, 1fr) 70px; gap:4px; padding:8px 0; border-bottom:1px solid var(--border); align-items:center}
.kg-input{background:var(--s3);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:4px;width:100%;text-align:center;outline:none}

/* ── CHAT ── */
.nw-chat{display:flex;flex-direction:column;height:450px;background:var(--s1);border:1px solid var(--border)}
.nw-msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:4px;max-width:85%;font-size:13px;line-height:1.5}
.msg.user{background:var(--accent);color:#fff;align-self:flex-end}
.msg.ai{background:var(--s3);border:1px solid var(--border2);align-self:flex-start}
.nw-input-row{display:flex;border-top:1px solid var(--border)}
.nw-input{flex:1;background:var(--s2);border:none;color:var(--text);padding:15px;outline:none}
.nw-send{background:var(--accent);border:none;color:#fff;padding:0 25px;font-weight:700;text-transform:uppercase}

@media(max-width:600px) {
    .ex-row { grid-template-columns: 100px 50px repeat(4, 1fr); }
    .topbar-right { display: none; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect, useRef} = React;

// ── CONFIG & CONSTANTS ──────────────────────────────────────────────────
const LBS_PER_KG = 2.20462;
const BAR_LBS = 45;
const BAR_KG = 20;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6y22WT8IwMmBtIlYZvwYjv9aST-jZYRjIhoBmRzsoFJZ_t80g54YEP6nEQBTp36j_/exec"; 

const COMP_MAXES = { squat: 513, bench: 314, deadlift: 584 };

const KG_PLATES = [
  {kg: 25,   color: '#e62020', h: 58}, // Red
  {kg: 20,   color: '#1a6ec7', h: 52}, // Blue
  {kg: 15,   color: '#f5c400', h: 46}, // Yellow
  {kg: 10,   color: '#2ea832', h: 38}, // Green
  {kg: 5,    color: '#ffffff', h: 30}, // White
  {kg: 2.5,  color: '#000000', h: 22, textColor:'#fff'}, // Black
  {kg: 1.25, color: '#999999', h: 16}  // Chrome
];

// ── HELPERS ────────────────────────────────────────────────────────────
const toKg = (lbs) => lbs / LBS_PER_KG;
const toLbs = (kg) => kg * LBS_PER_KG;

function getIPFPlates(lbsInput) {
  const targetKg = toKg(lbsInput);
  let sideKg = (targetKg - BAR_KG) / 2;
  if (sideKg < 0) return [];
  
  const plates = [];
  KG_PLATES.forEach(p => {
    const count = Math.floor(sideKg / p.kg + 0.0001);
    if (count > 0) {
      plates.push({...p, count});
      sideKg -= p.kg * count;
    }
  });
  return plates;
}

// ── COMPONENTS ─────────────────────────────────────────────────────────
function PlateVisualizer({ lbs }) {
  const weight = parseFloat(lbs);
  if (!weight || weight < 45) return null;
  const plates = getIPFPlates(weight);
  
  return (
    <div className="bar-viz">
      <div className="bar-viz-inner">
        {[...plates].reverse().map((p, i) => Array.from({length: p.count}).map((_, j) => (
          <div key={`l-${i}-${j}`} className="bv-plate" style={{background: p.color, height: p.h, color: p.textColor || '#000'}}>{p.kg}</div>
        )))}
        <div className="bv-collar" />
        <div className="bv-bar-center" />
        <div className="bv-collar" />
        {plates.map((p, i) => Array.from({length: p.count}).map((_, j) => (
          <div key={`r-${i}-${j}`} className="bv-plate" style={{background: p.color, height: p.h, color: p.textColor || '#000'}}>{p.kg}</div>
        )))}
      </div>
      <div className="bv-info">{weight} lbs ≈ {(toKg(weight)).toFixed(1)} kg</div>
    </div>
  );
}

function LogTab({logData, setLogData}) {
  const lifts = [
    { id: 'sq', name: "Squat", target: "265" },
    { id: 'bp', name: "Bench Press", target: "185" },
    { id: 'dl', name: "Deadlift", target: "315" }
  ];

  return (
    <div className="main">
      <div className="sec-head">Training Log (LBS)</div>
      {lifts.map((ex) => (
        <div key={ex.id} style={{marginBottom: 20}}>
          <div className="ex-row">
            <div style={{fontWeight: 700}}>{ex.name}</div>
            <div style={{fontSize:10, color:'var(--muted)'}}>Target: {ex.target}</div>
            <input className="kg-input" type="number" placeholder="LBS" 
                   value={logData[ex.id] || ''} 
                   onChange={(e) => setLogData({...logData, [ex.id]: e.target.value})} />
          </div>
          {logData[ex.id] && <PlateVisualizer lbs={logData[ex.id]} />}
        </div>
      ))}
    </div>
  );
}

function NextWeekTab({logData}) {
  const [msgs, setMsgs] = useState([{role: 'ai', text: "Ready to review, Austin. How was the movement today?"}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef();

  useEffect(() => { if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs]);

  const handleSend = async () => {
    if (!input || loading) return;
    const userMsg = { role: 'user', text: input };
    setMsgs([...msgs, userMsg]);
    setInput("");
    setLoading(true);

    const context = `
      ATHLETE: Austin Grogan. History: SQ 513, BP 314, DL 584.
      PHASE: Strength. Logic: If RPE < Target, +5lbs. Use LBS.
      CURRENT SESSION: ${JSON.stringify(logData)}
    `;

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'chat', system: "You are Austin's technical Powerlifting coach.", messages: [{role:'user', content: context + "\n\nUser:" + input}]})
      });
      const data = await res.json();
      setMsgs(prev => [...prev, {role: 'ai', text: data.response || "No response from coach."}]);
    } catch (e) {
      setMsgs(prev => [...prev, {role: 'ai', text: "Connection error. Coach is offline."}]);
    }
    setLoading(false);
  };

  return (
    <div className="main">
      <div className="sec-head">Coach AI</div>
      <div className="nw-chat">
        <div className="nw-msgs" ref={scrollRef}>
          {msgs.map((m, i) => <div key={i} className={`msg ${m.role}`}>{m.text}</div>)}
          {loading && <div className="msg ai">Analyzing metrics...</div>}
        </div>
        <div className="nw-input-row">
          <input className="nw-input" value={input} onChange={e => setInput(e.target.value)} placeholder="Message coach..." onKeyPress={e => e.key === 'Enter' && handleSend()} />
          <button className="nw-send" onClick={handleSend}>GO</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('log');
  const [logData, setLogData] = useState(() => {
    const s = localStorage.getItem('ap_log_lbs');
    return s ? JSON.parse(s) : {};
  });

  useEffect(() => { localStorage.setItem('ap_log_lbs', JSON.stringify(logData)); }, [logData]);

  return (
    <div id="root">
      <div className="topbar">
        <div className="topbar-brand">AUSTIN<em>LIFT</em></div>
        <div className="topbar-nav">
          <button className={`tnav ${tab==='log'?'active':''}`} onClick={()=>setTab('log')}>Log</button>
          <button className={`tnav ${tab==='coach'?'active':''}`} onClick={()=>setTab('coach')}>AI Coach</button>
        </div>
        <div className="topbar-right">
            <div className="max-item"><div className="max-label">SQ</div><div className="max-val">513</div></div>
            <div className="max-item"><div className="max-label">BP</div><div className="max-val">314</div></div>
            <div className="max-item"><div className="max-label">DL</div><div className="max-val">584</div></div>
        </div>
      </div>
      {tab === 'log' ? <LogTab logData={logData} setLogData={setLogData} /> : <NextWeekTab logData={logData} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
